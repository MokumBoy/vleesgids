<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>ChefCuts V8</title>
</head>
<body>
<h1>ChefCuts V8</h1>
<div id='count'></div>
<div id='list'></div>

<script>
fetch('cuts_full_v8_pro.json')
.then(res => res.json())
.then(data => {

  const cuts = data.cuts;

  document.getElementById('count').innerHTML = "Aantal cuts: " + cuts.length;

  let html = "";
  cuts.slice(0,50).forEach(c => {
    html += `<div><b>${c.cut_nl}</b> (${c.diersoort}) - ${c.auto_advies}</div>`;
  });

  document.getElementById('list').innerHTML = html;

});
</script>
</body>
</html>
